name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Create fake lint log
        run: |
          mkdir -p runs/wokwi/test-verilator-lint
          touch runs/wokwi/test-verilator-lint/verilator-lint.log

      - name: Build GDS
        uses: TinyTapeout/tt-gds-action@main
        with:
          pdk: sky130A
